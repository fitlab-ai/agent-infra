description = "Close a Code Scanning (CodeQL) alert with a documented reason"
prompt = """
Close Code Scanning (CodeQL) alert #{{args}}.

Steps:

1. **Fetch alert**:
   - `gh api repos/:owner/:repo/code-scanning/alerts/{{args}}`.
   - If already closed, inform user and exit.

2. **Interact / Execute**:
   - **If user has NOT provided a reason**:
     - Display alert details (rule, location, message).
     - Ask for close reason (false positive, won't fix, test code).
     - Require detailed explanation (minimum 20 characters).
     - **Stop and wait for user response.**

   - **If user has provided a reason** (in context or arguments):
     - Confirm reason is reasonable.
     - Execute close:
       ```bash
       gh api --method PATCH "repos/:owner/:repo/code-scanning/alerts/{{args}}" \
         -f state=dismissed -f dismissed_reason="<reason>" -f dismissed_comment="<comment>"
       ```
     - Record in associated task (if any).
     - Inform user of result.

3. **Next step**:
   If other pending security alerts remain:
   - Claude Code / OpenCode: `/analyze-codescan {alert-number}`
   - Gemini CLI: `/{project}:analyze-codescan {alert-number}`
   - Codex CLI: `/prompts:{project}-analyze-codescan {alert-number}`

**Note**: Exercise caution when closing high-severity alerts. Prefer fixing over dismissing.
"""

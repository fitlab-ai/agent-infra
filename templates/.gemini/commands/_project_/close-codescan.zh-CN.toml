description = "关闭 Code Scanning 告警"
prompt = """
请关闭 Code Scanning (CodeQL) 告警 #{{args}}。

执行以下步骤:

1. **获取告警**:
   - `gh api repos/:owner/:repo/code-scanning/alerts/{{args}}`。
   - 如果已关闭，提示并退出。

2. **交互/执行**:
   - **如果用户未提供理由**:
     - 展示告警详情（规则、位置、消息）。
     - 询问关闭理由（误报、不修复、测试代码）。
     - 要求详细说明（至少 20 个字符）。
     - **停止执行并等待用户回复。**

   - **如果用户已提供理由**（在上下文中或参数中）:
     - 确认理由合理。
     - 执行关闭:
       ```bash
       gh api --method PATCH "repos/:owner/:repo/code-scanning/alerts/{{args}}" \
         -f state=dismissed -f dismissed_reason="<reason>" -f dismissed_comment="<comment>"
       ```
     - 记录到关联任务（如有）。
     - 告知用户结果。

3. **下一步**:
   如果还有其他待处理的安全告警:
   - Claude Code / OpenCode: `/analyze-codescan {alert-number}`
   - Gemini CLI: `/{project}:analyze-codescan {alert-number}`
   - Codex CLI: `/prompts:{project}-analyze-codescan {alert-number}`

**注意**: 关闭高严重性告警时需谨慎，优先修复而非忽略。
"""

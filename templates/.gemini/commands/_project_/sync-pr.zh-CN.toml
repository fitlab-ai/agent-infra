description = "将任务进度同步到 PR"
prompt = """
请将任务 {{args}} 的进度同步到 Pull Request。

**当前时间**: !{date '+%Y-%m-%d %H:%M:%S'}

**任务状态**:
!{if [ -d .ai-workspace/active/{{args}} ]; then echo "active"; else echo "check other dirs"; fi}

执行以下步骤:

1. **读取任务**:
   - 读取 `task.md` 获取 `pr_number`。
   - 读取上下文文件。

2. **生成摘要**:
   - 重点描述技术决策和实现要点（面向审查者）。
   - 包含: 已完成步骤、当前进展、下一步、相关文件。

3. **同步**:
   - `gh pr comment <pr_number> --body "<summary>"`

4. **更新状态**:
   - 在 `task.md` 中更新 `last_synced_to_pr_at`。

5. **告知用户**: 同步完成。
"""

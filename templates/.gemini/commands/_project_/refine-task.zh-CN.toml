description = "处理代码审查反馈并修复问题"
prompt = """
请处理任务 {{args}} 的代码审查反馈并修复问题。

**检查前置条件**:
!{if [ -f .ai-workspace/active/{{args}}/review.md ]; then echo "审查报告存在"; else echo "审查报告不存在"; fi}

执行以下步骤:

1. **读取审查报告**:
   - 读取 `review.md`。
   - 提取所有 Blocker 和 Major 问题。

2. **执行修复**:
   - 按优先级修复: Blocker -> Major -> Minor。
   - 确保不引入新问题。
   - 运行测试确保通过。

3. **创建修复报告**:
   - 创建 `refinement-report.md`，包含: 修复概要、修复内容详情、未修复问题及原因、测试结果。

4. **更新任务状态**:
   - current_step: refinement, updated_at: 当前时间。

5. **告知用户**:
   - 提示下一步:
     - 重新审查:
       - Claude Code / OpenCode: `/review-task {{args}}`
       - Gemini CLI: `/{project}:review-task {{args}}`
       - Codex CLI: `/prompts:{project}-review-task {{args}}`
     - 或直接提交:
       - Claude Code / OpenCode: `/commit`
       - Gemini CLI: `/{project}:commit`
       - Codex CLI: `/prompts:{project}-commit`

**注意**: 不要添加额外变更，不要自动提交代码。
"""

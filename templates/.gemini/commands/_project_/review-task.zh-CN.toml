description = "审查任务实现并输出代码审查报告"
prompt = """
请审查任务 {{args}} 的代码实现。

**检查前置条件**:
!{if [ -f .ai-workspace/active/{{args}}/task.md ]; then echo "✅ 任务文件存在"; else echo "❌ 任务文件不存在"; fi}
!{if [ -f .ai-workspace/active/{{args}}/implementation.md ]; then echo "✅ 实现报告存在"; else echo "❌ 实现报告不存在"; fi}

执行以下步骤:

1. **准备审查**:
   - 读取 `implementation.md` 了解变更。
   - 使用 `git diff` 或读取相关源码文件进行检查。

2. **执行代码审查**:
   检查点:
   - 代码质量和规范。
   - Bug 和潜在问题。
   - 测试覆盖率和质量。
   - 错误处理和边界情况。
   - 安全和性能。
   - 与 `plan.md` 的一致性。

3. **输出审查报告**:
   在任务目录下创建 `review.md`, 包含:
   - 审查概要
   - 审查发现:
     - 🔴 必须修复(Blocker)
     - 🟡 建议修改(Major)
     - 🟢 优化建议(Minor)
   - 优点与亮点
   - 规范/测试/安全/性能审查详情
   - 总结与建议

4. **更新任务状态**:
   - 修改 `task.md`:
     - current_step: code-review
     - updated_at: 当前时间
     - 标记代码审查为完成

5. **告知用户**:
   - 输出审查结果摘要。
   - 根据结果建议:
     - 无问题:
       - Claude Code / OpenCode: `/commit`
       - Gemini CLI: `/{project}:commit`
       - Codex CLI: `/prompts:{project}-commit`
     - 有问题:
       - Claude Code / OpenCode: `/refine-task {{args}}`
       - Gemini CLI: `/{project}:refine-task {{args}}`
       - Codex CLI: `/prompts:{project}-refine-task {{args}}`
     - 重大问题:
       - Claude Code / OpenCode: `/implement-task {{args}}`
       - Gemini CLI: `/{project}:implement-task {{args}}`
       - Codex CLI: `/prompts:{project}-implement-task {{args}}`

**原则**:
- 严格但公正。
- 给出具体文件和行号。
"""
